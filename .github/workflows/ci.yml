name: Nearby API Delivery

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Selecione a ação desejada:"
        required: true
        default: "Build & Test"
        type: choice
        options:
          - "Build Only"
          - "Build & Test"
          - "Deploy"

  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Linter Check
        run: npm run lint

      - name: Build NestJS App
        run: npm run build

  test:
    name: Run Tests
    needs: build
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'Build & Test' || github.event.inputs.action == 'Deploy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit Tests
        run: npm run test

  deploy:
    name: 🚀 Deploy
    needs: [build, test]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'Deploy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Release execution
        run: |
          echo "Build e Testes concluídos. Iniciando Deploy..."
          # Futura integração com AWS/Serverless aqui
