name: CI/CD Pipeline | NestJS API

on:
  workflow_dispatch:
    inputs:
      action:
        description: "O que você deseja executar?"
        required: true
        default: "Build e Testes"
        type: choice
        options:
          - "Apenas Build"
          - "Build e Testes"
          - "Deploy (Futuro)"

  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS App
        run: npm run build

  test:
    name: Run Tests
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'Build e Testes' || github.event.inputs.action == 'Deploy (Futuro)' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Linter Check
        run: npm run lint

      - name: Unit Tests
        run: npm run test

  deploy:
    name: 🚀 Deploy
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'Deploy (Futuro)' }}
    needs: [build, test]
    runs-on: ubuntu-latest

    steps:
      - name: 🚧 Placeholder de Deploy
        run: |
          echo "Os testes passaram! Iniciando rotina de Deploy..."
          echo "Add futuramente AWS CLI, Serverless Framework, Docker ou SSH para o servidor..."
